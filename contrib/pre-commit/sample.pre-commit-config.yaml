# Copiar a .pre-commit-config.yaml del repo de la aplicación (no de zscan).
# Ajusta `entry` a tu instalación: global `zscan`, npx, o ruta a dist/cli.js
repos:
  - repo: local
    hooks:
      - id: zscan-deps
        name: zscan dependency scan (OSV)
        language: system
        entry: zscan scan --root . --no-print
        pass_filenames: false
        stages: [pre-push]
